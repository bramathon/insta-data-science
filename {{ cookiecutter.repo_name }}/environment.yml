name: {{ cookiecutter.repo_name }}
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8

  # The basics
  - numpy
  - pandas
  - scipy

  # Development
  - awscli
  - black
  - dvc
  - pre-commit
  - jupyterlab
  - jupyterlab-git

  # Machine-learning
  - scikit-learn
  - tensorflow-gpu
  - xgboost
  
  # Plotting
  - matplotlib
  - plotly::plotly
  - plotly::python-kaleido

  # Pip
  - pip
  - pip:
      - wandb
      - virtualenv==20.0.23 # pre-commit doesn't work with default version
      - python-language-server[all]
